shop_ecom_dbt:
  outputs:
    dev:
      dbname: "{{ env_var('PSQL_DB_NAME') }}"
      host: "{{ env_var('PSQL_DB_HOST') }}"
      pass: "{{ env_var('PSQL_DB_USER_PASSWORD') }}"
      port: "{{ env_var('PSQL_PORT') }}"
      schema: "{{ env_var('PSQL_SCHEMA_NAME') }}"
      threads: 1
      type: postgres
      user: "{{ env_var('PSQL_DB_USER_NAME') }}"
  target: dev
